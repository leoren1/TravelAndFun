name: explore_index
description: Discover more. Experience deeper. Collect moments.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  image: ^4.1.7
  native_exif: ^0.6.0
  geolocator: ^13.0.1
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/static_data/
    - assets/avatars/
    - assets/images/

  # Fonts are loaded via google_fonts package — no local font assets needed
