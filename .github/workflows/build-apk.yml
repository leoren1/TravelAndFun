name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ExploreIndex-v${VERSION}.apk
          echo "APK_PATH=build/app/outputs/flutter-apk/ExploreIndex-v${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_NAME=ExploreIndex-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-build${{ github.run_number }}
          name: Explore Index v${{ env.VERSION }} (build ${{ github.run_number }})
          body: |
            ## Explore Index — Android APK

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded APK and install

          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
